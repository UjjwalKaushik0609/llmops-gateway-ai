[pytest]
minversion = 7.0
addopts = -ra -q --strict-markers
testpaths = tests
asyncio_mode = auto
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (require DB/Redis)
    slow: Slow-running tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
