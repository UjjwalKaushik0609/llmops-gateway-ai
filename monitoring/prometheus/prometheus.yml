global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: llmops-gateway-ai
    environment: production

# Alerting rules
rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # LLMOps API metrics
  - job_name: llmops-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Node exporter (system metrics - add if using node-exporter)
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
    honor_labels: true
