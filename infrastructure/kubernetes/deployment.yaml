---
# ─── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: llmops
  labels:
    app: llmops-gateway-ai
    environment: production

---
# ─── ConfigMap ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: llmops-config
  namespace: llmops
data:
  APP_ENV: "production"
  DEBUG: "false"
  CHROMA_HOST: "chromadb-service"
  CHROMA_PORT: "8001"
  PROMETHEUS_PORT: "9090"
  RATE_LIMIT_PER_MINUTE: "60"
  ENABLE_AUTO_ROUTING: "true"

---
# ─── Secret (use AWS Secrets Manager or Vault in production) ──────────────────
apiVersion: v1
kind: Secret
metadata:
  name: llmops-secrets
  namespace: llmops
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://llmops:CHANGE_ME@postgres-service:5432/llmops_db"
  REDIS_URL: "redis://redis-service:6379/0"
  SECRET_KEY: "CHANGE_ME_TO_RANDOM_32_CHAR_STRING"
  JWT_SECRET_KEY: "CHANGE_ME_TO_ANOTHER_RANDOM_STRING"
  OPENAI_API_KEY: "sk-your-openai-key"
  ANTHROPIC_API_KEY: "sk-ant-your-anthropic-key"
  GEMINI_API_KEY: "your-gemini-key"
  MISTRAL_API_KEY: "your-mistral-key"

---
# ─── FastAPI Deployment ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmops-api
  namespace: llmops
  labels:
    app: llmops-api
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: llmops-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: llmops-api
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: llmops-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: llmops-api
          image: your-ecr-repo/llmops-gateway-ai:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: llmops-config
            - secretRef:
                name: llmops-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

---
# ─── API Service ───────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: llmops-api-service
  namespace: llmops
  labels:
    app: llmops-api
spec:
  type: ClusterIP
  selector:
    app: llmops-api
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http

---
# ─── Horizontal Pod Autoscaler ────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llmops-api-hpa
  namespace: llmops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llmops-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ─── Ingress ───────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llmops-ingress
  namespace: llmops
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.your-domain.com
      secretName: llmops-tls
  rules:
    - host: api.your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: llmops-api-service
                port:
                  number: 80

---
# ─── Service Account ────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llmops-sa
  namespace: llmops
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/llmops-gateway-role

---
# ─── Pod Disruption Budget ────────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: llmops-api-pdb
  namespace: llmops
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: llmops-api
